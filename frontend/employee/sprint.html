<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Sprint — Nizan Tech</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/favicon.png">
  <link rel="stylesheet" href="../css/globals.css" />
  <link rel="stylesheet" href="../css/sidebar.css" />
  <link rel="stylesheet" href="../css/employee.css" />
  <style>
    /* ── Sprint Plan Table ── */
    .plan-section {
      margin-top: 22px;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .plan-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .plan-section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .plan-table-scroll {
      overflow-x: auto;
      max-height: 480px;
      overflow-y: auto;
    }

    .plan-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 700px;
    }

    .plan-table th {
      background: var(--surface);
      color: var(--text-muted);
      font-weight: 600;
      padding: 10px 14px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 1;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .plan-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border-dim);
      vertical-align: top;
      line-height: 1.5;
    }

    .plan-table tr:last-child td {
      border-bottom: none;
    }

    .plan-table tr:hover td {
      background: rgba(108, 99, 255, .03);
    }

    .plan-table tr.today-row td {
      background: rgba(108, 99, 255, .07);
    }

    .plan-table tr.today-row {
      border-left: 3px solid var(--primary);
    }

    .day-col {
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
    }

    .date-col {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .module-col {
      font-weight: 600;
      color: var(--text);
    }

    .tasks-col {
      color: var(--text-muted);
    }

    .notes-col {
      color: var(--text-dim);
      font-size: 12px;
    }

    .status-chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-pending {
      background: rgba(255, 179, 71, .15);
      color: #FFB347;
    }

    .status-in-progress {
      background: rgba(108, 99, 255, .2);
      color: #8B82FF;
    }

    .status-done {
      background: rgba(0, 212, 170, .15);
      color: #00D4AA;
    }

    /* Editable cells for allowed employees */
    .edit-cell input,
    .edit-cell textarea,
    .edit-cell select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      padding: 4px 8px;
      width: 100%;
      font-family: inherit;
      resize: none;
    }

    .edit-cell input:focus,
    .edit-cell textarea:focus,
    .edit-cell select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .save-row-btn {
      font-size: 11px;
      padding: 3px 10px;
      margin-top: 5px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      display: none;
    }

    .save-row-btn.visible {
      display: inline-block;
    }

    .edit-granted-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      background: rgba(0, 212, 170, .12);
      color: #00D4AA;
      font-weight: 600;
    }

    /* View toggle */
    .view-toggle {
      display: flex;
      gap: 6px;
    }

    .view-toggle button {
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid var(--border);
      cursor: pointer;
      background: var(--surface);
      color: var(--text-muted);
      transition: all .15s;
    }

    .view-toggle button.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
  </style>
</head>

<body class="auth-loading">
  <div class="mobile-topbar">
    <button class="hamburger" id="hamburger">☰</button>
    <span class="mobile-logo">Nizan Tech</span>
    <div style="width:40px"></div>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon" style="background: none; padding: 0;">
          <img src="/assets/sidebar-logo.png" alt="Nizan logo" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <div class="sidebar-logo-text">
          <span class="sidebar-logo-name">Nizan Tech</span>
          <span class="sidebar-logo-sub">Employee Panel</span>
        </div>
      </div>
      <div class="sidebar-user">
        <div class="avatar" id="sidebarAvatar" style="background:#00D4AA">E</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebarUserName">Employee</div>
          <span class="sidebar-user-role role-employee" id="sidebarUserRole">employee</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Menu</div>
        <a href="dashboard.html" class="nav-item" data-nav="dashboard"><span
            class="nav-icon">📊</span><span>Dashboard</span></a>
        <a href="sprint.html" class="nav-item" data-nav="sprint"><span class="nav-icon">🗂️</span><span>My
            Sprint</span></a>
        <a href="timesheet.html" class="nav-item" data-nav="timesheet"><span
            class="nav-icon">⏱️</span><span>Timesheet</span></a>
      </nav>
      <div class="sidebar-bottom">
        <div class="theme-toggle" id="themeToggle"><span class="nav-icon">🌙</span><span>Dark Mode</span>
          <div class="toggle-switch"></div>
        </div>
        <button class="nav-item" id="logoutBtn"><span class="nav-icon">🚪</span><span>Logout</span></button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-content">
        <div class="page-header">
          <h1 class="page-title">My Sprint</h1>
          <p class="page-subtitle">Your assigned sprint plan and time log</p>
        </div>
        <div id="sprintContainer">
          <div style="text-align:center;padding:60px">
            <div class="spinner" style="margin:0 auto 12px"></div>Loading sprint...
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Day Modal (Time blocks) -->
  <div class="modal-overlay" id="dayModal">
    <div class="modal day-modal">
      <div class="day-modal-header">
        <div>
          <div class="day-modal-title" id="dayModalTitle">Day 1</div>
          <div class="day-modal-date" id="dayModalDate"></div>
        </div>
        <button class="modal-close" onclick="modal.close('dayModal')">✕</button>
      </div>

      <div id="dayModalAgenda"
        style="display:none; background:rgba(108, 99, 255, 0.1); border-left: 3px solid var(--primary); border-radius:4px 8px 8px 4px; padding:12px 16px; margin-top:16px;">
        <div
          style="font-size:10px; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px;">
          🎯 Assigned for today</div>
        <div id="dayModalAgendaContent" style="font-size:13px; color:var(--text); line-height:1.5;"></div>
      </div>

      <div class="day-total-bar">
        <span style="font-size:13px;color:var(--text-muted)">Total Hours Today</span>
        <span class="day-total-hours" id="dayTotalHours">0.0h</span>
      </div>

      <div class="block-list" id="blockList">
        <div class="spinner" style="margin:0 auto"></div>
      </div>

      <div id="addBlockSection">
        <button class="btn btn-primary" id="showAddBlockBtn" style="width:100%;justify-content:center">
          ➕ Add Time Block
        </button>
        <div class="add-block-form" id="addBlockForm" style="display:none;margin-top:12px">
          <div class="add-block-form-title">➕ New Time Block</div>
          <div class="time-inputs">
            <div class="form-group">
              <label class="form-label">Start Time</label>
              <input type="time" id="blockStart" class="form-input" required />
            </div>
            <div class="form-group">
              <label class="form-label">End Time</label>
              <input type="time" id="blockEnd" class="form-input" required />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <input type="text" id="blockDesc" class="form-input" placeholder="What did you work on?" required />
          </div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn btn-ghost btn-sm" id="cancelAddBlock">Cancel</button>
            <button class="btn btn-primary btn-sm" id="saveBlockBtn">Save Block</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Block Modal -->
  <div class="modal-overlay" id="editBlockModal">
    <div class="modal" style="max-width:460px">
      <div class="modal-header">
        <div class="modal-title">Edit Time Block</div>
        <button class="modal-close" onclick="modal.close('editBlockModal')">✕</button>
      </div>
      <input type="hidden" id="editBlockId" />
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="time-inputs">
          <div class="form-group">
            <label class="form-label">Start Time</label>
            <input type="time" id="editStart" class="form-input" />
          </div>
          <div class="form-group">
            <label class="form-label">End Time</label>
            <input type="time" id="editEnd" class="form-input" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <input type="text" id="editDesc" class="form-input" />
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:10px;margin-top:4px">
          <input type="checkbox" id="editCompleted" style="width:18px;height:18px;cursor:pointer" />
          <label for="editCompleted" style="cursor:pointer;font-size:13px;font-weight:600">Mark as Completed</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="modal.close('editBlockModal')">Cancel</button>
        <button class="btn btn-primary" id="saveEditBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/socket.js"></script>
  <script src="../js/employee/sprint.js"></script>
  <script src="../js/employee/timeblock.js"></script>
</body>

</html>
